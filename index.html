<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation Brocante</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .reservation-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 { color: var(--primary); text-align: center; font-size: 1.5rem; margin-bottom: 25px; }
        form { display: flex; flex-direction: column; gap: 18px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 14px; color: #444; }
        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* Évite le zoom iOS */
            outline: none;
        }
        input:focus { border-color: var(--success); }
        
        .legal-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            font-size: 13px;
        }
        .checkbox-line {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .checkbox-line input { width: 20px; height: 20px; cursor: pointer; }

        .btn-submit {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:disabled { background: #ccc; }

        #message-succes {
            display: none;
            text-align: center;
            color: var(--success);
            font-weight: bold;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="reservation-card" id="form-container">
    <h1>🎟️ Réserver un emplacement</h1>
    
    <form id="resa-form">
        <div class="group">
            <label>Vous êtes :</label>
            <select id="typeExposant" onchange="togglePro()">
                <option value="Particulier">Un Particulier</option>
                <option value="Professionnel">Un Professionnel</option>
            </select>
        </div>

        <div class="group" id="siret-div" style="display:none">
            <label>N° SIRET</label>
            <input type="text" id="siret" inputmode="numeric" placeholder="14 chiffres">
        </div>

        <div class="group">
            <label>Nom & Prénom</label>
            <input type="text" id="nom" required placeholder="Jean Dupont">
        </div>

        <div class="group">
            <label>Téléphone mobile</label>
            <input type="tel" id="telephone" required placeholder="06 00 00 00 00">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="group">
                <label>Métrage (m)</label>
                <input type="number" id="metres" value="2" min="1">
            </div>
            <div class="group">
                <label>Repas (15€)</label>
                <input type="number" id="repas" value="0" min="0">
            </div>
        </div>

        <div class="legal-box">
            <label class="checkbox-line">
                <input type="checkbox" id="rgpd" required>
                <span>J'accepte que mes données soient utilisées pour la gestion de cette brocante.</span>
            </label>
            <label class="checkbox-line" id="honneur-line">
                <input type="checkbox" id="honneur">
                <span><strong>Attestation :</strong> Je certifie ne pas participer à plus de 2 ventes au déballage cette année.</span>
            </label>
        </div>

        <button type="submit" class="btn-submit" id="btn-valider">Confirmer ma réservation</button>
    </form>
</div>

<div id="message-succes">
    <h2>✅ Merci !</h2>
    <p>Votre réservation a bien été enregistrée.<br>Le Comité des Fêtes reviendra vers vous.</p>
    <button onclick="location.reload()" style="background:none; border:1px solid #ccc; padding:8px; border-radius:5px; cursor:pointer">Nouvelle saisie</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // Config Firebase (Identique à votre base de données)
    const firebaseConfig = {
        apiKey: "AIzaSyDk6OPQe7XS5hdtNfJHOriTc00_RWCI4A4",
        authDomain: "inscription-brocante.firebaseapp.com",
        databaseURL: "https://inscription-brocante-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "inscription-brocante",
        storageBucket: "inscription-brocante.firebasestorage.app",
        messagingSenderId: "836597625276",
        appId: "1:836597625276:web:432d6eaada859773f5bbb9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const anneeSelectionnee = new Date().getFullYear().toString();

    function togglePro() {
        const isPro = document.getElementById('typeExposant').value === "Professionnel";
        document.getElementById('siret-div').style.display = isPro ? 'flex' : 'none';
        document.getElementById('honneur-line').style.display = isPro ? 'none' : 'flex';
    }

    document.getElementById('resa-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const type = document.getElementById('typeExposant').value;
        const honorCheck = document.getElementById('honneur').checked;

        if (type === "Particulier" && !honorCheck) {
            alert("Veuillez cocher l'attestation sur l'honneur.");
            return;
        }

        const btn = document.getElementById('btn-valider');
        btn.disabled = true;
        btn.innerText = "Envoi en cours...";

        const nouvelleResa = {
            nom: document.getElementById('nom').value,
            type: type,
            telephone: document.getElementById('telephone').value,
            metres: parseInt(document.getElementById('metres').value),
            repas: parseInt(document.getElementById('repas').value),
            siret: type === "Professionnel" ? document.getElementById('siret').value : "",
            statut: "En attente",
            dateSaisie: new Date().toLocaleString(),
            provenance: "Formulaire Client"
        };

        // Envoi à la même branche Firebase que votre tableau
        db.ref("annees/" + anneeSelectionnee + "/exposants").push(nouvelleResa)
            .then(() => {
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('message-succes').style.display = 'block';
            })
            .catch((error) => {
                alert("Erreur : " + error.message);
                btn.disabled = false;
                btn.innerText = "Confirmer ma réservation";
            });
    });
</script>

</body>
</html>
