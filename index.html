<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Brocante - Comité des Fêtes</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }
        .form-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 { color: var(--primary); text-align: center; font-size: 1.4rem; margin-bottom: 20px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 14px; color: #555; }
        
        input, select {
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* Important pour éviter le zoom forcé sur iPhone */
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--success); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .legal {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-top: 10px;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 13px;
            line-height: 1.4;
        }
        .checkbox-group input { width: 22px; height: 22px; cursor: pointer; flex-shrink: 0; }

        .btn-submit {
            background: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background: #ccc; }

        #success-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .icon-check { font-size: 50px; color: var(--success); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="form-card" id="main-card">
    <h1>📝 Inscription Exposant</h1>
    
    <form id="form-exposant">
        <div class="field">
            <label>Vous êtes :</label>
            <select id="typeExposant" onchange="togglePro()">
                <option value="Particulier">Un Particulier</option>
                <option value="Professionnel">Un Professionnel</option>
            </select>
        </div>

        <div class="field" id="div-siret" style="display:none">
            <label>N° SIRET</label>
            <input type="text" id="siret" inputmode="numeric" placeholder="14 chiffres">
        </div>

        <div class="field">
            <label>Nom & Prénom</label>
            <input type="text" id="nom" required placeholder="Ex: Jean DUPONT">
        </div>

        <div class="field">
            <label>Téléphone Mobile</label>
            <input type="tel" id="telephone" required placeholder="06 00 00 00 00">
        </div>

        <div class="field">
            <label>E-mail</label>
            <input type="email" id="email" required placeholder="votre@email.com">
        </div>

        <div class="row">
            <div class="field">
                <label>Métrage (2€/m)</label>
                <input type="number" id="metres" value="2" min="1" inputmode="numeric">
            </div>
            <div class="field">
                <label>Repas (15€)</label>
                <input type="number" id="repas" value="0" min="0" inputmode="numeric">
            </div>
        </div>

        <div class="legal">
            <label class="checkbox-group">
                <input type="checkbox" id="rgpd" required>
                <span>J'accepte le traitement de mes données pour l'organisation de cet événement.</span>
            </label>
            
            <label class="checkbox-group" id="label-honneur">
                <input type="checkbox" id="honneur">
                <span><strong>Attestation :</strong> Je certifie ne pas participer à plus de 2 ventes au déballage cette année.</span>
            </label>
        </div>

        <button type="submit" class="btn-submit" id="btn-valider">Valider mon inscription</button>
    </form>
</div>

<div class="form-card" id="success-screen">
    <div class="icon-check">✅</div>
    <h2>C'est enregistré !</h2>
    <p>Votre demande d'inscription a bien été transmise au Comité des Fêtes.</p>
    <p style="font-size: 14px; color: #666;">Vous pouvez fermer cette page.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // Configuration identique à votre compte pour que les deux communiquent
    const firebaseConfig = {
        apiKey: "AIzaSyDk6OPQe7XS5hdtNfJHOriTc00_RWCI4A4",
        authDomain: "inscription-brocante.firebaseapp.com",
        databaseURL: "https://inscription-brocante-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "inscription-brocante",
        storageBucket: "inscription-brocante.firebasestorage.app",
        messagingSenderId: "836597625276",
        appId: "1:836597625276:web:432d6eaada859773f5bbb9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const anneeSelectionnee = new Date().getFullYear().toString();

    function togglePro() {
        const isPro = document.getElementById('typeExposant').value === "Professionnel";
        document.getElementById('div-siret').style.display = isPro ? 'flex' : 'none';
        document.getElementById('label-honneur').style.display = isPro ? 'none' : 'flex';
    }

    document.getElementById('form-exposant').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const type = document.getElementById('typeExposant').value;
        const honorCheck = document.getElementById('honneur').checked;

        if (type === "Particulier" && !honorCheck) {
            alert("Vous devez cocher l'attestation sur l'honneur.");
            return;
        }

        const btn = document.getElementById('btn-valider');
        btn.disabled = true;
        btn.innerText = "Envoi en cours...";

        const data = {
            nom: document.getElementById('nom').value,
            type: type,
            telephone: document.getElementById('telephone').value,
            email: document.getElementById('email').value,
            metres: parseInt(document.getElementById('metres').value),
            repas: parseInt(document.getElementById('repas').value),
            siret: type === "Professionnel" ? document.getElementById('siret').value : "",
            statut: "En attente", // Statut par défaut pour l'admin
            emplacement: "-",     // À remplir par l'admin plus tard
            prixTotal: (parseInt(document.getElementById('metres').value) * 2) + (parseInt(document.getElementById('repas').value) * 15),
            dateSaisie: new Date().toLocaleString()
        };

        // Envoi vers la même base de données
        db.ref("annees/" + anneeSelectionnee + "/exposants").push(data)
            .then(() => {
                document.getElementById('main-card').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
            })
            .catch((error) => {
                alert("Erreur réseau : " + error.message);
                btn.disabled = false;
                btn.innerText = "Valider mon inscription";
            });
    });
</script>

</body>
</html>
